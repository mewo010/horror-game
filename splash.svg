<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#120c07"/>
      <stop offset="50%" stop-color="#22150d"/>
      <stop offset="100%" stop-color="#060403"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#d4b25d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <g opacity="0.25" filter="url(#blur)">
    <rect x="120" y="110" width="1040" height="520" rx="32" fill="#c8a830"/>
  </g>
  <rect x="110" y="100" width="1060" height="520" rx="32" fill="none" stroke="#c8a830" stroke-opacity="0.45" stroke-width="2"/>
  <g fill="#f8e8bf" font-family="Segoe UI, Arial, sans-serif" letter-spacing="6">
    <text x="640" y="260" text-anchor="middle" font-size="34" opacity="0.85">THE BACKROOMS</text>
    <text x="640" y="330" text-anchor="middle" font-size="62" font-weight="700">LOADING THE NIGHTMARE</text>
    <text x="640" y="410" text-anchor="middle" font-size="18" opacity="0.9">ONE DAY OFIR YANIV WAS CONTROLLING THE COMPUTER</text>
    <text x="640" y="450" text-anchor="middle" font-size="18" opacity="0.9">WHEN THE TEACHER SNAPPED...</text>
  </g>
  <rect x="320" y="520" width="640" height="6" rx="3" fill="#c8a830" opacity="0.35"/>
  <rect x="320" y="520" width="180" height="6" rx="3" fill="#ffe082" opacity="0.9">
    <animate attributeName="width" from="180" to="640" dur="2.4s" repeatCount="indefinite"/>
  </rect>
</svg>